<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EtherFlow</title>
  <style>
    :root {
      --bg: #02040d;
      --panel: rgba(12, 16, 30, 0.94);
      --panel-border: rgba(255, 255, 255, 0.06);
      --muted: #7d8497;
      --text: #f4f7fb;
      --blue: #1f4fff;
      --green: #4de27d;
      --orange: #f39a37;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top center, rgba(25, 53, 139, 0.18), transparent 34%),
        linear-gradient(180deg, #02050f 0%, #010309 100%);
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 58px;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(2, 5, 15, 0.9);
      backdrop-filter: blur(8px);
    }

    .brand,
    .topbar-actions,
    .status {
      display: flex;
      align-items: center;
    }

    .brand {
      gap: 10px;
      font-size: 16px;
      font-weight: 700;
    }

    .logo {
      width: 28px;
      height: 28px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #2f63ff, #1735c7);
      box-shadow: 0 8px 24px rgba(31, 79, 255, 0.3);
    }

    .logo::before {
      content: "";
      width: 10px;
      height: 10px;
      display: block;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-left-color: transparent;
      transform: rotate(45deg);
    }

    .topbar-actions {
      gap: 12px;
    }

    .status {
      gap: 7px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: #b2b8ca;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .status::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ff4b4b;
      box-shadow: 0 0 12px rgba(255, 75, 75, 0.75);
    }

    .primary-btn {
      border: 0;
      border-radius: 12px;
      padding: 0 18px;
      height: 34px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      background: linear-gradient(180deg, #2e61ff, #1c43d3);
      box-shadow: 0 10px 24px rgba(31, 79, 255, 0.3);
    }

    main {
      flex: 1;
      width: min(100%, 700px);
      margin: 60px auto 0;
      padding: 0 28px 60px;
    }

    .card {
      background: linear-gradient(180deg, rgba(10, 14, 27, 0.96), rgba(7, 10, 19, 0.94));
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      box-shadow:
        0 22px 60px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .balance-card {
      padding: 30px 30px 30px;
    }

    .balance-label {
      text-align: center;
      letter-spacing: 2px;
      font-size: 14px;
      font-weight: 700;
      color: #7f879a;
    }

    .balance-value {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-weight: 800;
    }

    .eth-mark {
      position: relative;
      width: 18px;
      height: 28px;
    }

    .eth-mark::before,
    .eth-mark::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
    }

    .eth-mark::before {
      top: 0;
      border-bottom: 12px solid #55a2ff;
    }

    .eth-mark::after {
      bottom: 0;
      border-top: 12px solid #3e73ff;
    }

    .balance-amount {
      font-size: clamp(34px, 5vw, 54px);
      line-height: 1;
    }

    .balance-unit {
      font-size: 22px;
      color: #8991a3;
      font-weight: 500;
    }

    .actions {
      margin-top: 34px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
    }

    .action-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      font-size: 16px;
      font-weight: 700;
    }

    .arrow {
      font-size: 25px;
      line-height: 1;
    }

    .arrow.down {
      color: var(--green);
    }

    .arrow.up {
      color: var(--orange);
    }

    .input-wrap {
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.08));
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: #61697e;
    }

    .input-wrap span:last-child {
      font-size: 12px;
      font-weight: 700;
    }

    .ghost-btn {
      width: 100%;
      margin-top: 12px;
      height: 36px;
      border: 0;
      border-radius: 10px;
      color: #e8ebf3;
      font-size: 14px;
      font-weight: 700;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.09));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .section-head {
      margin: 34px 2px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-head h2 {
      margin: 0;
      font-size: 16px;
    }

    .view-all {
      font-size: 14px;
      color: #2356ff;
      text-decoration: none;
    }

    .history-card {
      min-height: 122px;
      padding: 24px 0 0;
      overflow: hidden;
    }

    .empty-text {
      text-align: center;
      color: #6f778b;
      font-style: italic;
    }

    .skeleton-row {
      margin-top: 24px;
      height: 56px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      opacity: 0.45;
    }

    .skeleton-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .circle,
    .line {
      background: rgba(255, 255, 255, 0.08);
    }

    .circle {
      width: 30px;
      height: 30px;
      border-radius: 50%;
    }

    .line {
      border-radius: 999px;
    }

    .line.short {
      width: 56px;
      height: 8px;
    }

    .line.tiny {
      width: 34px;
      height: 8px;
    }

    footer {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #696f80;
      font-size: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.03);
      background: rgba(2, 5, 15, 0.64);
    }

    @media (max-width: 720px) {
      main {
        margin-top: 34px;
        padding: 0 16px 36px;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .topbar {
        padding: 0 12px;
      }

      .topbar-actions {
        gap: 8px;
      }

      .status {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <span>EtherFlow</span>
      </div>
      <div class="topbar-actions">
        <div class="status">Disconnected</div>
        <button class="primary-btn" type="button">Connect Wallet</button>
      </div>
    </header>

    <main>
      <section class="card balance-card">
        <div class="balance-label">TOTAL BALANCE</div>
        <div class="balance-value">
          <span class="eth-mark" aria-hidden="true"></span>
          <span class="balance-amount">0.00</span>
          <span class="balance-unit">ETH</span>
        </div>

        <div class="actions">
          <div class="action">
            <div class="action-title">
              <span class="arrow down">↓</span>
              <span>Deposit</span>
            </div>
            <div class="input-wrap">
              <span>0.00</span>
              <span>ETH</span>
            </div>
            <button class="ghost-btn" type="button">Deposit ETH</button>
          </div>

          <div class="action">
            <div class="action-title">
              <span class="arrow up">↑</span>
              <span>Withdraw</span>
            </div>
            <div class="input-wrap">
              <span>0.00</span>
              <span>ETH</span>
            </div>
            <button class="ghost-btn" type="button">Withdraw ETH</button>
          </div>
        </div>
      </section>

      <div class="section-head">
        <h2>Transaction History</h2>
        <a class="view-all" href="#">View All</a>
      </div>

      <section class="card history-card">
        <div class="empty-text">No transactions found. Connect your wallet to see recent activity.</div>
        <div class="skeleton-row">
          <div class="skeleton-left">
            <div class="circle"></div>
            <div class="line short"></div>
          </div>
          <div class="line tiny"></div>
        </div>
      </section>
    </main>

    <footer>&copy; 2023 EtherFlow Protocol. Secure. Decentralized. Fast.</footer>
  </div>
</body>

</html>
