<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>EtherFlow | Web3 Dashboard</title>
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#1132d4',
                            hover: '#0e28aa',
                        },
                        surface: {
                            dark: '#0a0a0a',
                            card: 'rgba(23, 23, 23, 0.7)',
                        }
                    },
                    borderRadius: {
                        'twelve': '12px',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style data-purpose="layout-and-glassmorphism">
        body {
            background-color: #050505;
            background-image:
                radial-gradient(circle at 50% 0%, rgba(17, 50, 212, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(17, 50, 212, 0.05) 0%, transparent 40%);
            min-height: 100vh;
            color: #ffffff;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }

        .input-field:focus {
            border-color: #1132d4 !important;
            ring-color: #1132d4 !important;
        }
    </style>
</head>

<body class="font-sans antialiased">
    <!-- BEGIN: MainHeader -->
    <header
        class="w-full border-b border-white/10 px-6 py-4 flex justify-between items-center sticky top-0 bg-black/20 backdrop-blur-md z-50">
        <div class="flex items-center gap-2" data-purpose="logo-container">
            <div class="w-10 h-10 bg-primary rounded-twelve flex items-center justify-center">
                <!-- SVG Icon for ETH/Abstract Logo -->
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-linecap="round"
                    stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="m7 11 5-8 5 8-5 8-5-8z"></path>
                    <path d="m7 11 5 8 5-8"></path>
                </svg>
            </div>
            <span class="text-xl font-bold tracking-tight">EtherFlow</span>
        </div>
        <div class="flex items-center gap-4">
            <!-- Wallet Status Icon & Button -->
            <div class="hidden md:flex items-center gap-2 px-3 py-1.5 bg-white/5 rounded-full border border-white/10">
                <div class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div>
                <span class="text-xs font-medium text-gray-400">Disconnected</span>
            </div>
            <button
                class="bg-primary hover:bg-primary-hover text-white px-6 py-2.5 rounded-twelve font-semibold transition-all active:scale-95 shadow-lg shadow-primary/20">
                Connect Wallet
            </button>
        </div>
    </header>
    <!-- END: MainHeader -->
    <!-- BEGIN: MainContent -->
    <main class="max-w-4xl mx-auto px-4 py-12 md:py-20">
        <!-- BEGIN: DashboardCard -->
        <section class="glass-card rounded-twelve p-8 md:p-10 mb-8" data-purpose="main-dashboard-card">
            <!-- Balance Display -->
            <div class="text-center mb-12" data-purpose="balance-display">
                <p class="text-gray-400 text-sm font-medium uppercase tracking-widest mb-2">Total Balance</p>
                <div class="flex items-center justify-center gap-3">
                    <svg class="w-8 h-8 text-blue-400" fill="currentColor" viewbox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M11.944 17.97L4.58 13.62 11.943 24l7.37-10.38-7.37 4.35zm.056-17.97L4.63 10.3l7.37 4.36 7.37-4.36L12 0z">
                        </path>
                    </svg>
                    <h1 class="text-5xl font-bold">0.00 <span class="text-2xl font-normal text-gray-400">ETH</span></h1>
                </div>
            </div>
            <!-- Action Sections: Deposit & Withdraw -->
            <div class="grid md:grid-cols-2 gap-8">
                <!-- Deposit Section -->
                <div class="space-y-4" data-purpose="deposit-container">
                    <h3 class="text-lg font-semibold flex items-center gap-2">
                        <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M19 14l-7 7m0 0l-7-7m7 7V3" stroke-linecap="round" stroke-linejoin="round"
                                stroke-width="2"></path>
                        </svg>
                        Deposit
                    </h3>
                    <div class="relative">
                        <input
                            class="input-field w-full px-4 py-3 rounded-twelve focus:ring-primary focus:border-primary transition-all"
                            placeholder="0.00" step="0.01" type="number" />
                        <span
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-bold text-gray-500">ETH</span>
                    </div>
                    <button
                        class="w-full bg-white/10 hover:bg-white/20 text-white font-bold py-3 rounded-twelve border border-white/10 transition-colors">
                        Deposit ETH
                    </button>
                </div>
                <!-- Withdraw Section -->
                <div class="space-y-4" data-purpose="withdraw-container">
                    <h3 class="text-lg font-semibold flex items-center gap-2">
                        <svg class="w-5 h-5 text-orange-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M5 10l7-7m0 0l7 7m-7-7v18" stroke-linecap="round" stroke-linejoin="round"
                                stroke-width="2"></path>
                        </svg>
                        Withdraw
                    </h3>
                    <div class="relative">
                        <input
                            class="input-field w-full px-4 py-3 rounded-twelve focus:ring-primary focus:border-primary transition-all"
                            placeholder="0.00" step="0.01" type="number" />
                        <span
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-bold text-gray-500">ETH</span>
                    </div>
                    <button
                        class="w-full bg-white/10 hover:bg-white/20 text-white font-bold py-3 rounded-twelve border border-white/10 transition-colors">
                        Withdraw ETH
                    </button>
                </div>
            </div>
        </section>
        <!-- END: DashboardCard -->
        <!-- BEGIN: TransactionHistoryPlaceholder -->
        <section class="mt-12" data-purpose="transaction-history">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-semibold">Transaction History</h2>
                <button class="text-sm text-primary font-medium hover:underline">View All</button>
            </div>
            <div class="glass-card rounded-twelve overflow-hidden">
                <div class="p-8 text-center text-gray-500 border-b border-white/5 italic">
                    No transactions found. Connect your wallet to see recent activity.
                </div>
                <!-- Mock Skeleton Rows -->
                <div class="p-4 flex items-center justify-between opacity-20 grayscale">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-gray-700"></div>
                        <div class="space-y-2">
                            <div class="w-24 h-3 bg-gray-700 rounded"></div>
                            <div class="w-16 h-2 bg-gray-700 rounded"></div>
                        </div>
                    </div>
                    <div class="w-20 h-4 bg-gray-700 rounded"></div>
                </div>
            </div>
        </section>
        <!-- END: TransactionHistoryPlaceholder -->
    </main>
    <!-- END: MainContent -->
    <!-- BEGIN: Footer -->
    <footer class="mt-20 py-8 border-t border-white/5 text-center text-gray-500 text-sm">
        <p>© 2023 EtherFlow Protocol. Secure. Decentralized. Fast.</p>
    </footer>
    <!-- END: Footer -->
</body>

</html>
